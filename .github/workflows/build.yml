name: Build para reMarkable Paper Pro

on:
  push:
    tags:
      - 'v*'          # se lanza al crear un tag tipo v1.0, v1.1, etc.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qtbase5-dev-tools

      - name: Compilar backend
        working-directory: backend
        run: cargo build --release --target aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Compilar recursos QML
        working-directory: ui
        run: |
          RCC=$(which rcc || find /usr/lib -name "rcc" -type f 2>/dev/null | head -1)
          $RCC -binary application.qrc -o ../resources.rcc

      - name: Empaquetar app
        run: |
          mkdir -p dist/nonogram-fetcher/backend
          cp manifest.json dist/nonogram-fetcher/
          cp resources.rcc dist/nonogram-fetcher/
          cp backend/target/aarch64-unknown-linux-musl/release/entry dist/nonogram-fetcher/backend/entry
          chmod +x dist/nonogram-fetcher/backend/entry
          [ -f icon.png ] && cp icon.png dist/nonogram-fetcher/ || true
          cd dist && tar -czf nonogram-fetcher.tar.gz nonogram-fetcher/

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/nonogram-fetcher.tar.gz
          body: |
            ## Instalación

            Conecta el reMarkable por WiFi, activa SSH y ejecuta este comando:

            ```
            curl -L https://github.com/${{ github.repository }}/releases/latest/download/nonogram-fetcher.tar.gz | tar -xz -C /home/root/xovi/exthome/appload/
            ```

            Reinicia xochitl y la app aparecerá en AppLoad.

      # Para workflow_dispatch sin tag, subir como artefacto igualmente
      - name: Subir artefacto (builds manuales)
        uses: actions/upload-artifact@v4
        with:
          name: nonogram-fetcher-rmpp
          path: dist/nonogram-fetcher.tar.gz
          retention-days: 30
