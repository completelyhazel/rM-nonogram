name: Build para reMarkable Paper Pro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qt6-base-dev

      - name: Compilar backend
        working-directory: backend
        run: cargo build --release --target aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Compilar recursos QML (Qt6)
        working-directory: ui
        run: |
          # Qt6 instala rcc como rcc o como rcc6 según la distro
          RCC=$(which rcc6 2>/dev/null || which rcc 2>/dev/null || find /usr/lib/qt6 -name "rcc" -type f 2>/dev/null | head -1)
          echo "Usando: $RCC ($($RCC --version 2>&1 | head -1))"
          $RCC -binary application.qrc -o ../resources.rcc

      - name: Empaquetar app
        run: |
          mkdir -p dist/nonogram-fetcher/backend
          cp manifest.json dist/nonogram-fetcher/
          cp resources.rcc dist/nonogram-fetcher/
          cp backend/target/aarch64-unknown-linux-musl/release/entry dist/nonogram-fetcher/backend/entry
          chmod +x dist/nonogram-fetcher/backend/entry
          [ -f icon.png ] && cp icon.png dist/nonogram-fetcher/ || true
          cd dist && tar -czf nonogram-fetcher.tar.gz nonogram-fetcher/

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/nonogram-fetcher.tar.gz
          body: |
            ## Instalación

            Conecta el reMarkable por WiFi, activa SSH y ejecuta:

            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/nonogram-fetcher.tar.gz -o /tmp/nonogram.tar.gz && tar -xz -C /home/root/xovi/exthome/appload/ -f /tmp/nonogram.tar.gz
            ```

            Reinicia xochitl y la app aparecerá en AppLoad.

      - name: Subir artefacto (builds manuales)
        uses: actions/upload-artifact@v4
        with:
          name: nonogram-fetcher-rmpp
          path: dist/nonogram-fetcher.tar.gz
          retention-days: 30
